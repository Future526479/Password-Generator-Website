<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        body{
            background-image: url("{{url_for('static', filename='img/Programming the future.jpg')}}");
        }
    </style>
    <script>
        function generatePassword() {
            fetch('/generate_password')
            .then(response => response.json())
            .then(data => {
                document.getElementById('password').innerText = data.password;
            })
            .catch(error => console.error('Error:', error));
        }
    </script>
</head>
<body>
<div class="modal modal-sheet position-static d-block p-4 py-md-5" tabindex="-1" role="dialog" id="modalSheet">
    <div class="modal-dialog" role="document">
        <div class="modal-content rounded-4 shadow">
            <div class="modal-header border-bottom-0">
                <h1>Password Generator</h1>
            </div>
                <div class="modal-body py-0">
                    <label for="fname" id="password"></label>
                </div>
            <div class="modal-footer flex-column align-items-stretch w-100 gap-2 pb-3 border-top-0">
                <button onclick="generatePassword()" class="btn btn-lg btn-primary">Generate Password</button>
            </div>
        </div>
    </div>
</div>
</body>
</html>
